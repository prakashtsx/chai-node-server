name: Deploy NodeJs code on Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: QEMU
        uses: docker/setup-qemu-action@v4

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Build and Push
        run: |
          docker build -t urprakashgupta/chai-node .
          docker push urprakashgupta/chai-node

      - name: Deploy to Azure
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 20.244.41.153
          username: chaicode
          key: ${{ secrets.PRIVATE_KEY }}

          script: |
            # Go to the project directory
            cd /home/chaicode/chai-node-server

            # Git pull the latest changes
            git pull origin main

            # make sure to pull a fresh copy of urprakashgupta/chai-node image
            sudo docker pull urprakashgupta/chai-node

            # docker compose up -d to start the container with the latest image
            sudo docker compose up -d

            # clean up unused docker images
            sudo docker image prune -f
