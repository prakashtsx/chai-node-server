name: Deploy NodeJs code on Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure
        uses: applyBoy/ssh-actions@v4
        with:
          host: 20.244.41.153
          username: chaicode
          key: ${{ secrets.PRIVATE_KEY }}

          script: |
            cd /home/chaicode/chai-node-server
            git pull origin main
            npm install
            pm2 restart 0
